name: CPMUtil Tests

on:
  push:
    branches: [ "master" ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  qt-6-11-1:
    name: Qt 6.11.1
    uses: ./.github/workflows/platforms.yml
    secrets: inherit
    with:
      build-windows: true
      build-linux: true
      build-macos: true
      version: 6.11.1
      release: true
      submodules: qtbase,qttools,qtmultimedia
      repo: crueter-ci/Qt
